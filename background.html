<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moment of Sparkles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base styles */
        body {
            overflow: hidden;
            margin: 0;
            cursor: crosshair;
            font-family: 'Inter', sans-serif;
        }

        /* The canvas takes up the full screen */
        #sparkleCanvas {
            display: block;
            background-color: #05051A; /* Very Dark Midnight Blue */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-[#05051A]">

    <canvas id="sparkleCanvas"></canvas>

    <script>
        // --- Canvas Setup ---
        const canvas = document.getElementById('sparkleCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        let particles = [];
        // Increased max particles for a more dense effect
        let maxParticles = 500; 
        let animationFrameId;

        // Function to set canvas size
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- Particle Class ---
        class Particle {
            constructor(x, y, isBurst = false) {
                this.x = x;
                this.y = y;
                // Small size for background
                this.radius = Math.random() * 1.5 + 0.5; 
                this.alpha = 1;
                this.friction = 0.98;
                this.isBurst = isBurst;

                // Color: White to light cyan/gold mix
                const colorChoice = Math.random();
                if (colorChoice < 0.4) {
                    this.color = '255, 255, 255'; // White
                } else if (colorChoice < 0.8) {
                    this.color = '173, 216, 230'; // Light Blue (LightCyan)
                } else {
                    this.color = '255, 223, 0'; // Gold/Yellowish
                }
                
                if (isBurst) {
                    // Burst particles move quickly outward
                    this.velocity = {
                        x: (Math.random() - 0.5) * (Math.random() * 8 + 2), 
                        y: (Math.random() - 0.5) * (Math.random() * 8 + 2)
                    };
                    this.decayRate = 0.03; // Faster fade
                    // Even smaller, finer sparkles (0.1 to 0.8 pixels)
                    this.radius = Math.random() * 0.7 + 0.1; 
                } else {
                    // Background particles (subtle drift)
                    this.velocity = {
                        x: (Math.random() - 0.5) * 0.2,
                        y: (Math.random() - 0.5) * 0.2
                    };
                    this.decayRate = 0; 
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = `rgba(${this.color}, ${this.alpha})`;
                ctx.fill();
                ctx.restore();
            }

            update() {
                // Apply friction and move
                if (this.isBurst) {
                    this.velocity.x *= this.friction;
                    this.velocity.y *= this.friction;
                    this.alpha -= this.decayRate;
                }
                
                this.x += this.velocity.x;
                this.y += this.velocity.y;
            }
        }

        // --- Sparkle Generation Logic ---

        // Create a subtle background field of 'stars'
        function createBackgroundSparkles(count) {
            for (let i = 0; i < count; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                particles.push(new Particle(x, y, false));
            }
        }

        // Create a burst of sparkles at a specific point
        function createSparkleBurst(x, y, count) {
            // Popup logic removed
            for (let i = 0; i < count; i++) {
                // Ensure we don't exceed the limit, prioritize the new burst
                if (particles.length >= maxParticles) {
                    particles.shift(); 
                }
                particles.push(new Particle(x, y, true));
            }
        }

        // --- Animation Loop ---
        function animate() {
            animationFrameId = requestAnimationFrame(animate);

            // Clear the canvas with the background color (Very Dark Midnight Blue)
            ctx.fillStyle = '#05051A'; 
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.update();
                p.draw();

                // If a burst particle fades out completely, remove it
                if (p.isBurst && p.alpha <= 0) {
                    particles.splice(i, 1);
                    i--; // Adjust index after removal
                }

                // If a background particle goes off screen, wrap it
                if (!p.isBurst) {
                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;
                }
            }
            
            // Maintain a minimum number of background particles
            if (particles.filter(p => !p.isBurst).length < 50) {
                createBackgroundSparkles(10);
            }
        }

        // --- Event Listeners ---
        let isMouseDown = false;
        let lastX = 0;
        let lastY = 0;

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            // Increased burst count
            createSparkleBurst(e.clientX, e.clientY, 50); 
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            // Create a small trail of sparkles on movement
            // Increased occasional sparkle chance and count
            if (isMouseDown || Math.random() < 0.2) { 
                createSparkleBurst(e.clientX, e.clientY, isMouseDown ? 25 : 10);
            }

            // Continuous trail for fast movement (while dragging)
            if (isMouseDown) {
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance > 10) {
                    // Increased trail density
                    createSparkleBurst(e.clientX, e.clientY, 20); 
                }
            }

            lastX = e.clientX;
            lastY = e.clientY;
        });

        // Touch support (mobile interaction)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            // Increased burst count
            createSparkleBurst(touch.clientX, touch.clientY, 50); 
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            // Increased trail density
            createSparkleBurst(touch.clientX, touch.clientY, 10); 
        });


        // --- Initialization ---
        window.onload = function() {
            createBackgroundSparkles(100); // 100 constant background sparkles
            animate();
        };

        // --- Utility functions for audio (Not used here but kept for completeness based on instructions) ---
        function base64ToArrayBuffer(base64) {
            const binaryString = atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function pcmToWav(pcmData, sampleRate) {
            const pcm16 = pcmData; // Already Int16Array
            const numChannels = 1;
            const bytesPerSample = 2; // 16-bit PCM

            const buffer = new ArrayBuffer(44 + pcm16.length * bytesPerSample);
            const view = new DataView(buffer);

            // RIFF chunk descriptor
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + pcm16.length * bytesPerSample, true);
            writeString(view, 8, 'WAVE');

            // FMT sub-chunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true); // Sub-chunk size
            view.setUint16(20, 1, true); // Audio format (1 = PCM)
            view.setUint16(22, numChannels, true); // Number of channels
            view.setUint32(24, sampleRate, true); // Sample rate
            view.setUint32(28, sampleRate * numChannels * bytesPerSample, true); // Byte rate
            view.setUint16(32, numChannels * bytesPerSample, true); // Block align
            view.setUint16(34, 16, true); // Bits per sample

            // Data sub-chunk
            writeString(view, 36, 'data');
            view.setUint32(40, pcm16.length * bytesPerSample, true); // Sub-chunk size

            // Write the PCM data
            let offset = 44;
            for (let i = 0; i < pcm16.length; i++, offset += 2) {
                view.setInt16(offset, pcm16[i], true);
            }

            return new Blob([view], { type: 'audio/wav' });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }
    </script>
</body>
</html>
