<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gyantrix Academy - Home</title>
  <link rel="stylesheet" href="style1.css">
  <link rel="stylesheet" href="headerfooter/footerstyle.css">
</head>
<body>
  <canvas id="sparkleCanvas"></canvas>
   <div id="header"></div>
  <section class="connectplan">
  <h1>Need Guidance? We're Here to Help!</h1>

  <div class="connectform-container">
    <div class="connectform">
      <form class="lead-table" id="answersForm">
        <label for="name">Your Name<span class="star">*</span>:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address<span class="star">*</span>:</label>
        <input type="email" id="email" name="email" required>

        <label for="number">Mobile Number<span class="star">*</span>:</label>
        <input type="tel" id="number" name="mobileNumber" required>

        <input type="hidden" name="source" value="answerForm">

        <button type="submit">Submit</button>
      </form>

      <div class="messages"></div>
    </div>

    <div class="connectform">
      <img src="public/images/contact.png" alt="Career Guidance">
    </div>
  </div>
</section>

<div id="footer"></div>

  <script src="script.js"></script>
  <script src="navbar.js"></script>
  <script src="./headerfooter/include.js"></script>
  <script>
const canvas = document.getElementById('sparkleCanvas');
const ctx = canvas.getContext('2d');

let width = window.innerWidth;
let height = window.innerHeight;
let particles = [];
let maxParticles = 500;
let animationFrameId;

function resizeCanvas() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Particle Class
class Particle {
  constructor(x, y, isBurst = false) {
    this.x = x;
    this.y = y;
    this.radius = Math.random() * 1.8 + 0.6;
    this.alpha = 1;
    this.friction = 0.97;
    this.isBurst = isBurst;

    // Random Color
    const colors = ["255,255,255", "173,216,230", "255,223,0"];
    this.color = colors[Math.floor(Math.random() * colors.length)];

    // Velocity
    if (isBurst) {
      this.velocity = {
        x: (Math.random() - 0.5) * (Math.random() * 12 + 4),
        y: (Math.random() - 0.5) * (Math.random() * 12 + 4)
      };
      this.decayRate = 0.03;
      this.radius = Math.random() * 0.8 + 0.2;
    } else {
      this.velocity = {
        x: (Math.random() - 0.5) * 0.6,
        y: (Math.random() - 0.5) * 0.6
      };
      this.decayRate = 0;
    }
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
    ctx.fillStyle = `rgba(${this.color}, ${this.alpha})`;
    ctx.fill();
    ctx.restore();
  }

  update() {
    if (this.isBurst) {
      this.velocity.x *= this.friction;
      this.velocity.y *= this.friction;
      this.alpha -= this.decayRate;
    }
    this.x += this.velocity.x;
    this.y += this.velocity.y;

    if (!this.isBurst) {
      if (this.x < 0) this.x = width;
      if (this.x > width) this.x = 0;
      if (this.y < 0) this.y = height;
      if (this.y > height) this.y = 0;
    }
  }
}

// Background Sparkles
function createBackgroundSparkles(count) {
  for (let i = 0; i < count; i++) {
    const x = Math.random() * width;
    const y = Math.random() * height;
    particles.push(new Particle(x, y, false));
  }
}

// Burst Sparkles
function createSparkleBurst(x, y, count) {
  for (let i = 0; i < count; i++) {
    if (particles.length >= maxParticles) particles.shift();
    particles.push(new Particle(x, y, true));
  }
}

// Animation Loop
function animate() {
  animationFrameId = requestAnimationFrame(animate);

  ctx.fillStyle = "#05051A";
  ctx.fillRect(0, 0, width, height);

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.update();
    p.draw();

    if (p.isBurst && p.alpha <= 0) {
      particles.splice(i, 1);
      i--;
    }
  }

  if (particles.filter(p => !p.isBurst).length < 50) {
    createBackgroundSparkles(10);
  }
}

// --- Pointer Interaction ---
let isMouseDown = false;
let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown", (e) => {
  isMouseDown = true;
  createSparkleBurst(e.clientX, e.clientY, 60);
});

canvas.addEventListener("mouseup", () => {
  isMouseDown = false;
});

canvas.addEventListener("mousemove", (e) => {
  if (isMouseDown || Math.random() < 0.35) {
    createSparkleBurst(e.clientX, e.clientY, isMouseDown ? 35 : 18);
  }

  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  const distance = Math.sqrt(dx * dx + dy * dy);

  if (distance > 12 && isMouseDown) {
    createSparkleBurst(e.clientX, e.clientY, 25);
  }

  lastX = e.clientX;
  lastY = e.clientY;
});

// Touch Support
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  const t = e.touches[0];
  createSparkleBurst(t.clientX, t.clientY, 50);
});

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  const t = e.touches[0];
  createSparkleBurst(t.clientX, t.clientY, 18);
});

// Init
window.onload = () => {
  createBackgroundSparkles(120);
  animate();
};
</script>
</body>
</html>
